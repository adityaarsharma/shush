name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests (stdlib only — no install needed)
        run: python -m unittest discover -s tests -v
      - name: Smoke test the CLI
        run: |
          printf 'contact raj@acme.in +91 98765 43210\n' > /tmp/smoke.txt
          python shush.py /tmp/smoke.txt
          grep -q '\[EMAIL\]' /tmp/smoke.scrubbed.txt
          grep -q '\[PHONE\]' /tmp/smoke.scrubbed.txt
          ! grep -q 'raj@acme.in' /tmp/smoke.scrubbed.txt
